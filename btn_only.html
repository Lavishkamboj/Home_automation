<!DOCTYPE html>
<html>
<head>
    <title>ESP32 Dual Relay Control (PC)</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            color: white;
            text-align: center;
        }

        h1 {
            margin-top: 25px;
        }

        .container {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-top: 40px;
            flex-wrap: wrap;
        }

        .card {
            background: rgba(255,255,255,0.1);
            padding: 25px;
            border-radius: 15px;
            width: 220px;
            box-shadow: 0 0 20px rgba(0,0,0,0.3);
        }

        button {
            width: 110px;
            height: 45px;
            margin: 10px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        .on {
            background-color: #00c853;
            color: white;
        }

        .off {
            background-color: #d50000;
            color: white;
        }

        button:hover {
            transform: scale(1.05);
        }

        .master {
            margin-top: 30px;
        }
    </style>
</head>

<body>

<h1>ESP32 Dual Relay Control (PC)</h1>

<div class="container">

    <div class="card">
        <h3>Relay 1</h3>
        <button class="on" onclick="relay1On()">ON</button>
        <button class="off" onclick="relay1Off()">OFF</button>
    </div>

    <div class="card">
        <h3>Relay 2</h3>
        <button class="on" onclick="relay2On()">ON</button>
        <button class="off" onclick="relay2Off()">OFF</button>
    </div>

</div>

<div class="master">
    <button class="on" onclick="allOn()">ALL ON</button>
    <button class="off" onclick="allOff()">ALL OFF</button>
</div>

<script>
    const ESP_IP = "10.229.204.199"; 

    function relay1On() {
        fetch(`http://${ESP_IP}/relay1on`)
        .catch(err => alert("Error connecting to ESP32"));
    }

    function relay1Off() {
        fetch(`http://${ESP_IP}/relay1off`)
        .catch(err => alert("Error connecting to ESP32"));
    }

    function relay2On() {
        fetch(`http://${ESP_IP}/relay2on`)
        .catch(err => alert("Error connecting to ESP32"));
    }

    function relay2Off() {
        fetch(`http://${ESP_IP}/relay2off`)
        .catch(err => alert("Error connecting to ESP32"));
    }

    function allOn() {
        fetch(`http://${ESP_IP}/allon`)
        .catch(err => alert("Error connecting to ESP32"));
    }

    function allOff() {
        fetch(`http://${ESP_IP}/alloff`)
        .catch(err => alert("Error connecting to ESP32"));
    }
</script>

</body>
</html>
